kind = "web"
previewPath = "/"
title = "TUNNER/TNR — Коммерческое Предложение"
version = "1.0.0"
id = "artifacts/tunner-kp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25206

[services.development]
run = "pnpm --filter @workspace/tunner-kp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tunner-kp", "run", "build" ]
publicDir = "artifacts/tunner-kp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25206"
BASE_PATH = "/"
